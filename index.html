<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumio — Map Your Universe</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0;overflow:hidden;background:#070b1a;color:#fff;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const storage = {
      get(key) { const val = window.localStorage.getItem(key); return val ? JSON.parse(val) : null; },
      set(key, val) { window.localStorage.setItem(key, JSON.stringify(val)); },
    };
    const defaultSettings = storage.get('lumio-settings-v1') || {background:'#070b1a',animation:true,speed:1,audio:true};
    function useSettings(){const [settings,setSettings]=useState(defaultSettings);useEffect(()=>storage.set('lumio-settings-v1',settings),[settings]);return [settings,setSettings];}
    const palette = ['#ff6b6b', '#ff9f43', '#feca57', '#48dbfb', '#1dd1a1', '#5f27cd','#54a0ff', '#00d2d3', '#f368e0', '#c8d6e5', '#576574', '#222f3e'];
    function randomCode(){return Array.from({length:6},()=>String.fromCharCode(65+Math.floor(Math.random()*26))).join('');}
    function popSound(){const ctx = new (window.AudioContext||window.webkitAudioContext)();const osc = ctx.createOscillator();const gain = ctx.createGain();osc.type='sine'; osc.frequency.setValueAtTime(880,ctx.currentTime);osc.frequency.exponentialRampToValueAtTime(440,ctx.currentTime+0.08);gain.gain.setValueAtTime(0.18,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.18);osc.connect(gain); gain.connect(ctx.destination);osc.start(); osc.stop(ctx.currentTime+0.2);}
    function Stars({bg='#070b1a'}) {const ref = useRef();useEffect(() => {const canvas = ref.current;const ctx = canvas.getContext('2d');let stars = [];function init() {stars = Array.from({ length: 200 }, () => ({x: Math.random() * canvas.width,y: Math.random() * canvas.height,r: Math.random() * 1.2 + 0.2}));draw();}function draw() {ctx.fillStyle = bg;ctx.fillRect(0, 0, canvas.width, canvas.height);ctx.fillStyle = '#fff';stars.forEach(s => {ctx.beginPath();ctx.arc(s.x, s.y, s.r, 0, 2 * Math.PI);ctx.fill();});requestAnimationFrame(draw);}init();window.addEventListener('resize', () => {canvas.width = window.innerWidth;canvas.height = window.innerHeight;});canvas.width = window.innerWidth;canvas.height = window.innerHeight;}, []);return <canvas ref={ref} style={{position:'fixed',top:0,left:0,zIndex:-1}} />;}
    function Logo({size=48}){return (<svg width={size} height={size} viewBox="0 0 120 24" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stopColor="#f0c27b" /><stop offset="100%" stopColor="#4b1248" /></linearGradient></defs><text x="0" y="17" fill="url(#grad)" fontFamily="Verdana" fontSize="18">lumio</text><circle cx="80" cy="12" r="2" fill="#ff6b6b" /><circle cx="90" cy="8" r="1.5" fill="#48dbfb" /><circle cx="98" cy="16" r="2" fill="#feca57" /></svg>);}
    function Splash({onStart}){return <div style={{position:'absolute',top:0,left:0,width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',textAlign:'center',color:'#fff'}}><Logo size={120} /><h1 style={{fontSize:'2.5rem'}}>Map Your Universe</h1><p style={{maxWidth:300}}>Uma ferramenta visual de mapas mentais com estética de sistema solar.</p><button onClick={onStart} style={{marginTop:20,padding:'10px 20px',fontSize:'1rem',cursor:'pointer',background:'#ff6b6b',border:'none',color:'#fff',borderRadius:4}}>Começar →</button></div>;}
    function useMaps() {const [maps, setMaps] = useState(storage.get('lumio-v3') || []);useEffect(() => storage.set('lumio-v3', maps), [maps]);return [maps, setMaps];}
    function Dashboard({maps, onOpen, onCreate, onJoin, onDelete, onRename}){const [newName,setNewName]=useState('');const [color,setColor]=useState(palette[0]);const [joinCode,setJoinCode]=useState('');return (<div style={{padding:20}}><h2>Seus universos</h2><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:20}}>{maps.map((m,i)=>(<div key={i} style={{padding:10,background:'#111',borderRadius:8,position:'relative'}}><div style={{cursor:'pointer'}} onClick={()=>onOpen(m)}><svg width={60} height={60}><circle cx={30} cy={30} r={20} fill={m.color} /></svg><div>{m.name}</div></div><button onClick={()=>{const n=prompt('Novo nome',m.name);if(n){onRename && onRename(m,n);}}} style={{position:'absolute',top:5,right:30,background:'#333',border:'none',color:'#fff',cursor:'pointer',padding:'2px 6px',borderRadius:3}}>✎</button><button onClick={()=>{if(confirm('Eliminar?')) onDelete && onDelete(m);}} style={{position:'absolute',top:5,right:5,background:'#e44',border:'none',color:'#fff',cursor:'pointer',padding:'2px 6px',borderRadius:3}}>×</button></div>))}<div style={{padding:10,background:'#222',borderRadius:8}}><input placeholder="Nome do mapa" value={newName} onChange={e=>setNewName(e.target.value)} style={{width:'100%',padding:6,background:'#111',border:'1px solid #333',color:'#fff',borderRadius:3,marginBottom:8,boxSizing:'border-box'}} /><div style={{marginBottom:8}}>{palette.map(c=> <span key={c} onClick={()=>setColor(c)} style={{display:'inline-block',width:20,height:20,background:c,margin:2,cursor:'pointer',border: c===color?'2px solid #fff':'1px solid #333',borderRadius:2}}></span>)}</div><button onClick={()=>{if(newName){onCreate({name:newName,color});setNewName('');}}} style={{width:'100%',padding:6,background:'#ff6b6b',border:'none',color:'#fff',borderRadius:3,cursor:'pointer'}}>Criar</button></div></div><div style={{marginTop:20}}><h3>Entrar com código</h3><input value={joinCode} onChange={e=>setJoinCode(e.target.value.toUpperCase())} placeholder="XXXXXX" style={{padding:6,background:'#111',border:'1px solid #333',color:'#fff',borderRadius:3,marginRight:8}} /><button onClick={()=>{if(joinCode)onJoin(joinCode);}} style={{padding:6,background:'#48dbfb',border:'none',color:'#000',borderRadius:3,cursor:'pointer'}}>Entrar</button></div></div>);}
    function findNode(node, path) {if (!path || path.length === 0) return node;const [head, ...rest] = path;const child = node.children && node.children.find(c => c.id === head);return child ? findNode(child, rest) : null;}
    function SettingsModal({settings,onChange,onClose}){const [bg,setBg]=useState(settings.background);const [anim,setAnim]=useState(settings.animation);const [speed,setSpeed]=useState(settings.speed);const [audio,setAudio]=useState(settings.audio);const save=()=>{onChange({background:bg,animation:anim,speed:speed,audio:audio});onClose();};return (<div style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:9999}}><div style={{background:'#111',padding:20,borderRadius:8,width:320,color:'#fff'}}><h3>Configurações</h3><div style={{marginBottom:12}}><label>Cor de fundo</label><input type="color" value={bg} onChange={e=>setBg(e.target.value)} style={{marginLeft:8}} /><div style={{marginTop:4}}>{['#070b1a','#001f3f','#0a0a0a','#1a1a2e','#000','#101010'].map(c=><span key={c} onClick={()=>setBg(c)} style={{display:'inline-block',width:20,height:20,background:c,margin:2,cursor:'pointer',border:c===bg?'2px solid #fff':'1px solid #333',borderRadius:2}}></span>)}</div></div><div style={{marginBottom:12}}><label><input type="checkbox" checked={anim} onChange={e=>setAnim(e.target.checked)} /> Animação de translação</label></div><div style={{marginBottom:12}}><label>Velocidade ({speed.toFixed(1)}x)</label><input type="range" min="0.2" max="2" step="0.1" value={speed} onChange={e=>setSpeed(parseFloat(e.target.value))} style={{width:'100%'}} /></div><div style={{marginBottom:12}}><label><input type="checkbox" checked={audio} onChange={e=>setAudio(e.target.checked)} /> Som ao adicionar nós</label></div><div style={{marginTop:10,textAlign:'right'}}><button onClick={onClose} style={{marginRight:10,padding:6,background:'#333',border:'none',color:'#fff',borderRadius:3,cursor:'pointer'}}>Cancelar</button><button onClick={save} style={{padding:6,background:'#1dd1a1',border:'none',color:'#000',borderRadius:3,cursor:'pointer'}}>Guardar</button></div></div></div>);}}
    function ShareModal({map,onClose}){const [tab,setTab]=useState('image');const [code,setCode]=useState(map.collabCode||'');const exportLink = () => {const str = btoa(JSON.stringify(map));return window.location.href.split('#')[0] + '#map=' + str;};const doShare = () => {const c = randomCode();storage.set('lumio-collab-'+c,map);setCode(c);};const exportImage = async () => {const svg = document.querySelector('svg');if(!svg) return;const xml = new XMLSerializer().serializeToString(svg);const svg64 = btoa(xml);const b64start = 'data:image/svg+xml;base64,';const img = new Image();img.src = b64start + svg64;const canvas = document.createElement('canvas');canvas.width = 900; canvas.height=620;const ctx = canvas.getContext('2d');img.onload = () => {ctx.drawImage(img,0,0);const png = canvas.toDataURL('image/png');const a = document.createElement('a');a.href = png; a.download = map.name + '.png';a.click();};};return (<div style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{background:'#111',padding:20,borderRadius:8,width:380,color:'#fff',maxHeight:'80vh',overflow:'auto'}}><h3>Partilhar</h3><div style={{marginBottom:10}}><button onClick={()=>setTab('image')} style={{marginRight:5,padding:6,background:tab==='image'?'#ff6b6b':'#333',border:'none',color:'#fff',borderRadius:3,cursor:'pointer'}}>Imagem</button><button onClick={()=>setTab('link')} style={{marginRight:5,padding:6,background:tab==='link'?'#ff6b6b':'#333',border:'none',color:'#fff',borderRadius:3,cursor:'pointer'}}>Link</button><button onClick={()=>setTab('colab')} style={{padding:6,background:tab==='colab'?'#ff6b6b':'#333',border:'none',color:'#fff',borderRadius:3,cursor:'pointer'}}>Colaborar</button></div>{tab==='image'&&<div><button onClick={exportImage} style={{width:'100%',padding:8,background:'#48dbfb',border:'none',color:'#000',borderRadius:3,cursor:'pointer'}}>Exportar PNG</button></div>}{tab==='link'&&<div><textarea readOnly value={exportLink()} style={{width:'100%',height:80,padding:6,background:'#222',border:'1px solid #444',color:'#fff',borderRadius:3,fontFamily:'monospace',fontSize:11}}/></div>}{tab==='colab'&&<div>{code?<div style={{padding:10,background:'#222',borderRadius:3,marginBottom:10}}>Código: <strong style={{fontSize:16,color:'#feca57'}}>{code}</strong></div>:<button onClick={doShare} style={{width:'100%',padding:8,background:'#1dd1a1',border:'none',color:'#000',borderRadius:3,cursor:'pointer'}}>Gerar código</button>}</div>}<div style={{marginTop:10,textAlign:'right'}}><button onClick={onClose} style={{padding:6,background:'#333',border:'none',color:'#fff',borderRadius:3,cursor:'pointer'}}>Fechar</button></div></div></div>);}
    function NodeIcon({node,r}){if(!node.image) return null;if(node.image.startsWith('data:')){return <image href={node.image} x={-r/2} y={-r/2} width={r} height={r} />;}return <text textAnchor="middle" dy="0.35em" style={{fontSize:r/1.5}}>{node.image}</text>;}
    function WrappedText({text, r}){const words = text.split(' ');const lines=[words[0]||''];for(let i=1;i<words.length;i++){if(lines[lines.length-1].length + words[i].length +1 > 10 && lines.length<2) lines.push(words[i]);else lines[lines.length-1]+= ' '+words[i];}return <text textAnchor="middle" dy="0.35em" style={{fill:'#fff',fontSize:12,fontWeight:'bold'}}>{lines.map((l,i)=><tspan x="0" dy={i===0?"0":"1.2em"} key={i}>{l}</tspan>)}</text>;}
    function NodeEditor({node, onSave, onClose}){const [label,setLabel]=useState(node.label||'');const [color,setColor]=useState(node.color||palette[0]);const [emoji,setEmoji]=useState(node.image||'');const [searchText,setSearchText]=useState('');const [searchResults,setSearchResults]=useState([]);const handleSave=()=>{onSave({...node,label,color,image:emoji});onClose();};return (<div style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{background:'#111',padding:20,borderRadius:8,width:340,color:'#fff',maxHeight:'80vh',overflow:'auto'}}><h3>{node.id?'Editar nó':'Novo nó'}</h3><div style={{marginBottom:12}}><label>Nome</label><input value={label} onChange={e=>setLabel(e.target.value)} style={{width:'100%',padding:6,background:'#222',border:'1px solid #444',color:'#fff',borderRadius:3,boxSizing:'border-box'}} /></div><div style={{marginBottom:12}}><label>Cor</label><div>{palette.map(c=> <span key={c} onClick={()=>setColor(c)} style={{display:'inline-block',width:20,height:20,background:c,margin:2,cursor:'pointer',border: c===color?'2px solid #fff':'1px solid #333',borderRadius:2}}></span>)}</div></div><div style={{marginBottom:12}}><label>Emoji/Icone</label><input value={emoji} onChange={e=>setEmoji(e.target.value)} style={{width:'100%',padding:6,background:'#222',border:'1px solid #444',color:'#fff',borderRadius:3,boxSizing:'border-box',marginBottom:6}} placeholder="😀" />{emoji && <div style={{marginBottom:6, fontSize:32,textAlign:'center'}}>{emoji.startsWith('data:')?<img src={emoji} width={48} />:emoji}</div>}<div style={{marginBottom:8}}><label style={{fontSize:12}}>Upload imagem</label><input type="file" accept="image/*" onChange={e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>{setEmoji(ev.target.result);};r.readAsDataURL(f);}}} style={{fontSize:11}} /></div><div><input placeholder="procurar emoji" value={searchText} onChange={e=>setSearchText(e.target.value)} style={{width:'calc(100% - 36px)',padding:4,background:'#222',border:'1px solid #444',color:'#fff',borderRadius:3,boxSizing:'border-box'}} /><button onClick={()=>{const all = ['😀','🚀','🌟','🪐','✨','💡','📘','🧠','🌌','🛸','🔭','🌙'];const res = all.filter(x=>x.includes(searchText)).slice(0,6);setSearchResults(res);}} style={{marginLeft:4,padding:4,background:'#444',border:'none',color:'#fff',borderRadius:3,cursor:'pointer'}}>🔍</button><div style={{marginTop:4}}>{searchResults.map(e=> <span key={e} style={{cursor:'pointer',fontSize:24,margin:4,display:'inline-block'}} onClick={()=>setEmoji(e)}>{e}</span>)}</div></div></div><div style={{marginTop:10,textAlign:'right'}}><button onClick={onClose} style={{marginRight:10,padding:6,background:'#333',border:'none',color:'#fff',borderRadius:3,cursor:'pointer'}}>Cancelar</button><button onClick={handleSave} style={{padding:6,background:'#1dd1a1',border:'none',color:'#000',borderRadius:3,cursor:'pointer'}}>Guardar</button></div></div></div>);}
    function MapView({map, onBack, onUpdate, settings}){const [path,setPath]=useState([]);const [zoom,setZoom]=useState(1);const svgRef = useRef();const [angle,setAngle]=useState(0);const [editingNode,setEditingNode]=useState(null);const [showShare,setShowShare]=useState(false);const centerNode = findNode(map.root, path) || map.root;const children = centerNode.children || [];useEffect(()=>{let id;function tick(){if(settings.animation){setAngle(a=>a+0.005*settings.speed);}id=requestAnimationFrame(tick);}id=requestAnimationFrame(tick);return ()=>cancelAnimationFrame(id);},[settings]);const handleAdd=(parent)=>{const newNode={id:Date.now().toString(),label:'Novo',color:palette[0],children:[]};parent.children=parent.children||[];parent.children.push(newNode);if(settings.audio) popSound();onUpdate(map);setEditingNode(newNode);};const handleSaveNode=(node)=>{onUpdate(map);};const handleDelete=(parent,child)=>{parent.children=parent.children.filter(c=>c!==child);onUpdate(map);};const navigate=(id)=>{setPath([...path,id]);};const goBack=()=>{setPath(path.slice(0,-1));};useEffect(()=>{const svg = svgRef.current;if(!svg) return;const wheel = e=>{e.preventDefault();const delta = e.deltaY<0?0.1:-0.1;setZoom(z=>Math.min(3,Math.max(0.5,z+delta)));};svg.addEventListener('wheel',wheel,{passive:false});return ()=>svg.removeEventListener('wheel',wheel);},[]);useEffect(()=>{if(map.collabCode){const id = setInterval(()=>{const fresh = storage.get('lumio-collab-'+map.collabCode);if(fresh && JSON.stringify(fresh) !== JSON.stringify(map)){onUpdate(fresh);}},3000);return ()=>clearInterval(id);}},[map.collabCode]);return (<div style={{position:'relative',width:'100%',height:'100%',overflow:'hidden'}}><button onClick={goBack} style={{position:'absolute',top:10,left:10,zIndex:10,padding:6,background:'#333',border:'none',color:'#fff',borderRadius:3,cursor:'pointer'}}>‹ Voltar</button><div style={{position:'absolute',bottom:10,right:10,zIndex:10}}><button onClick={()=>setZoom(z=>Math.min(3,z+0.2))} style={{padding:6,background:'#333',border:'none',color:'#fff',borderRadius:3,cursor:'pointer',marginRight:4}}>+</button><button onClick={()=>setZoom(z=>Math.max(0.5,z-0.2))} style={{padding:6,background:'#333',border:'none',color:'#fff',borderRadius:3,cursor:'pointer'}}>−</button></div><button onClick={()=>setShowShare(true)} style={{position:'absolute',top:10,right:10,zIndex:10,padding:6,background:'#48dbfb',border:'none',color:'#000',borderRadius:3,cursor:'pointer'}}>Partilhar</button>{map.readOnly && <div style={{position:'absolute',top:10,left:'50%',transform:'translateX(-50%)',background:'#e44',padding:'4px 10px',borderRadius:4,zIndex:10,fontSize:12}}>📖 Leitura</div>}<div style={{position:'absolute',top:10,left:60,zIndex:10,fontSize:12}}>{(() => {const crumbs = [{id:'root',label:map.root.label}];let cur=map.root;path.forEach(id=>{const nxt = (cur.children||[]).find(c=>c.id===id);if(nxt){cur=nxt;crumbs.push({id:id,label:nxt.label});}});return crumbs.map((c,i)=><span key={i} style={{cursor:'pointer',marginRight:4,color:i===crumbs.length-1?'#feca57':'#ccc'}} onClick={()=>setPath(path.slice(0,i))}>{i>0?" / ":""}{c.label}</span>);})()}</div><svg ref={svgRef} width={900} height={620} viewBox="0 0 900 620" style={{background:'transparent',transform:`scale(${zoom})`,transformOrigin:'center',cursor:'grab'}}><g transform="translate(450 310)"><circle r={48} fill={centerNode.color||palette[0]} onClick={()=>{}} style={{cursor:'pointer'}} /><NodeIcon node={centerNode} r={48} /><text textAnchor="middle" dy="0.35em" style={{fill:'#fff',fontSize:14,fontWeight:'bold'}}><tspan x="0" dy="0">{centerNode.label}</tspan></text>{children.map((child,i)=>{const theta=angle + (i/children.length)*2*Math.PI;const x=Math.cos(theta)*155;const y=Math.sin(theta)*155;const grandchildren = child.children||[];return (<g key={child.id} transform={`translate(${x} ${y})`}><circle r={30} fill={child.color||palette[0]} onClick={()=>navigate(child.id)} style={{cursor:'pointer'}} /><NodeIcon node={child} r={30} /><WrappedText text={child.label} r={30} />{!map.readOnly && <g transform="translate(45 -5)" style={{cursor:'pointer'}}><circle r={10} fill="#333" opacity="0.7" onClick={()=>setEditingNode(child)} /><text onClick={()=>setEditingNode(child)} textAnchor="middle" dy="0.35em" style={{fontSize:14,fill:'#fff',cursor:'pointer'}}>✎</text></g>}{!map.readOnly && <g transform="translate(45 10)" style={{cursor:'pointer'}}><circle r={10} fill="#1dd1a1" opacity="0.7" onClick={()=>handleAdd(child)} /><text onClick={()=>handleAdd(child)} textAnchor="middle" dy="0.35em" style={{fontSize:16,fill:'#000',cursor:'pointer'}}>＋</text></g>}{!map.readOnly && <g transform="translate(45 25)" style={{cursor:'pointer'}}><circle r={10} fill="#ff6b6b" opacity="0.7" onClick={()=>handleDelete(centerNode,child)} /><text onClick={()=>handleDelete(centerNode,child)} textAnchor="middle" dy="0.35em" style={{fontSize:14,fill:'#fff',cursor:'pointer'}}>×</text></g>}{grandchildren.map((gc,j)=>{const phi = angle*2 + (j/grandchildren.length)*2*Math.PI;const gx = Math.cos(phi)*70;const gy = Math.sin(phi)*70;return (<g key={gc.id} transform={`translate(${gx} ${gy})`}><circle r={18} fill={gc.color||palette[0]} style={{opacity:0.8}} /><NodeIcon node={gc} r={18} /></g>);})}</g>);})}</g></svg>{editingNode && <NodeEditor node={editingNode} onSave={handleSaveNode} onClose={()=>setEditingNode(null)} />}{showShare && <ShareModal map={map} onClose={()=>setShowShare(false)} />}</div>);}
    function App(){const [showSplash,setShowSplash]=useState(true);const [maps,setMaps]=useMaps();const [activeMap,setActiveMap]=useState(null);const [settings,setSettings]=useSettings();const [showSettings,setShowSettings]=useState(false);useEffect(()=>{document.body.style.background=settings.background;},[settings.background]);if(window.location.hash.startsWith('#map=')){try{const data = JSON.parse(atob(window.location.hash.split('=')[1]));setActiveMap({...data,readOnly:true});setShowSplash(false);}catch(e){}}},[]);const handleCreate=m=>{m.root={id:'root',label:m.name,color:m.color,children:[]};setMaps([...maps,m]);};const handleDeleteMap = m => {setMaps(maps.filter(x=>x!==m));};const handleRename = (m,newName)=>{m.name=newName;if(m.root) m.root.label=newName;setMaps([...maps]);};const handleJoin=code=>{const data = storage.get('lumio-collab-'+code);if(data){setActiveMap({...data,readOnly:true,collabCode:code});setShowSplash(false);} else alert('Código inválido');};const handleOpen=m=>setActiveMap(m);const handleUpdate=(updated)=>{const clone = JSON.parse(JSON.stringify(updated));if(clone.collabCode){storage.set('lumio-collab-'+clone.collabCode,clone);}setMaps(maps.map(m=>m===activeMap?clone:m));setActiveMap(clone);};return (<><button onClick={()=>setShowSettings(true)} style={{position:'absolute',top:10,right:10,zIndex:100,background:'#ff9f43',border:'none',color:'#000',width:40,height:40,borderRadius:4,cursor:'pointer',fontSize:16}}>⚙</button>{showSettings && <SettingsModal settings={settings} onChange={setSettings} onClose={()=>setShowSettings(false)}/>}{showSplash && <Splash onStart={()=>setShowSplash(false)}/>}{!showSplash && !activeMap && <Dashboard maps={maps} onOpen={handleOpen} onCreate={handleCreate} onJoin={handleJoin} onDelete={handleDeleteMap} onRename={handleRename}/>}{activeMap && <MapView map={activeMap} onBack={()=>setActiveMap(null)} onUpdate={handleUpdate} settings={settings}/>}</>);}
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
